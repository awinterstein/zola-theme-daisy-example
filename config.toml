# The URL the site will be built for
base_url = "https://zola-daisy.netlify.app"

theme = "daisy"

title = "Daisy Theme"
description = "Example / demo page for the Daisy theme for Zola."

# Whether to automatically compile all Sass files in the sass directory
compile_sass = false

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = true

# Whether to generate RSS feeds for the website pages
generate_feeds = true

taxonomies = [{ name = "tags", paginate_by = 2, feed = true }]

[markdown]
# Whether to do syntax highlighting
# Theme can be customised by setting the `highlight_theme` variable to a theme supported by Zola
highlight_code = true

[extra]
# Put all your custom variables here
enable_theme_switching = true

footer_links = [
    { url = "about", i18n_key = "about" },
    { url = "sitemap.xml", i18n_key = "sitemap", no_translation = true },
]

footer_notice = 'Daisy Theme - Powered by <a href="https://getzola.org">Zola</a>, <a href="https://tailwindcss.com">TailwindCSS</a> & <a href="https://daisyui.com">DaisyUI</a>'

[extra.navbar]
links = [
    { url = "blog", i18n_key = "posts" },
    { url = "tags", i18n_key = "tags" },
]

[extra.social]
codeberg = ""
github = "https://github.com/awinterstein/zola-theme-daisy"
gitlab = ""
stackoverflow = ""
mastodon = ""
linkedin = ""
instagram = ""
youtube = ""
signal = ""
telegram = ""
email = ""
phone = ""

[extra.favicon]
svg = "favicon.svg"

[languages.de]
title = "Daisy Theme"
description = "Beispiel- und Demoseite des Daisy-Themas für Zola."

# Whether to generate RSS feeds for the website pages
generate_feeds = true

taxonomies = [{ name = "tags", paginate_by = 2, feed = true }]
